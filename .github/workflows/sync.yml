name: Sync Components

on:
  repository_dispatch:
    types: [sync-components]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          repository: junl-zuo/vite_vue3
          path: main_repo
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync components
        run: |
          mkdir -p src/components
          cp -r main_repo/src/components/* src/components/
          rm -rf main_repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Sync components from main repo" || echo "No changes"
          git push